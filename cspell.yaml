# cSpell configuration
# Documentation: https://cspell.org/configuration/

version: "0.2"
language: en-GB

# Project-specific dictionary
words:
  - axe
  - buildpack
  - Chromium
  - codebase
  - cSpell
  - Dockerfile
  - Eleventy
  - frontmatter
  - Hemingway
  - Heroku
  - kitfrance
  - makendon
  - Netlify
  - njk
  - Nunjucks
  - Pagefind
  - PicoCSS
  - Pico
  - Playwright
  - prismjs
  - Prism
  - syntaxhighlight
  - webp
  - webkit

# Paths to ignore
ignorePaths:
  - node_modules/**
  - dist/**
  - .cache/**
  - package-lock.json
  - playwright-report/**
  - test-results/**
  - "**/*.min.js"
  - "**/*.min.css"

# Ignore URLs
ignoreRegExpList:
  - /https?:\/\/[^\s]*/g
