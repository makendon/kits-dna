name: Playwright Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  playwright-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
      with:
        egress-policy: audit

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: 25.6.0

    - name: Install dependencies
      run: npm ci

    - name: Build site
      run: npm run build

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Start dev server
      run: |
        npm start &
        npx wait-on http://localhost:8080
      timeout-minutes: 5

    - name: Run Playwright tests against dev server
      run: npx playwright test
      env:
        BASE_URL: http://localhost:8080

    - name: Stop dev server
      run: pkill -f "npm start" || true

    - name: Build Docker image
      run: docker build -t test-site .

    - name: Run container for testing
      run: |
        docker run -d -p 3000:8080 --name test-container test-site
        sleep 10

    - name: Run Playwright tests against container
      run: npx playwright test
      env:
        BASE_URL: http://localhost:3000

    - name: Stop container
      if: always()
      run: docker stop test-container && docker rm test-container

    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 1
